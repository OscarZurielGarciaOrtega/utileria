<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <script src="js/utileria.js" defer></script>
    <script src="js/index.js" defer></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="resgistro-container">
        <h1>Registro de Usuario</h1>

        <form id="formRegistro">
            <div class="input-group">
                <label for="nombre">Nombre Completo (Solo Letras):</label>
                <input type="text" id="nombre" required>
            </div>

            <div class="input-group">
                <label for="telefono">Teléfono (Máx 10 dígitos)</label>
                <input type="number" id="telefono" required>
            </div>

            <div class="input-group">
                <label for="fechaNac">Fecha de Nacimiento:</label>
                <input type="date" id="fechaNac" required>
            </div>

            <button type="submit">Validar y Calcular Edad</button>
        </form>
    </div>

    <dialog id="modalEdad" style="padding: 20px; border-radius: 8px; border: 1px solid #ccc;">
        <h2>Resultado de Validación</h2>
        <p id="textoModal"></p>
        <button id="cerrarModal" style="margin-top: 10px;">Cerrar</button>
    </dialog>
    
</body>
</html>
