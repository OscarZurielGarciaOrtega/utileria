<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="js/utileria.js" defer></script>
    <script src="js/login.js" defer></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="login-container">
        <h1>Iniciar Sesión</h1>

        <form id="formLogin">
            <div class="input-group">
                <label for="correo">Correlo Electrónico:</label>
                <input type="text" id="correo" placeholder="correo@ejemplo.com">
            </div>

            <div class="input-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" placeholder="********">
            </div>

            <button type="submit">Ingresar</button>
        </form>

        <div id="mensajeFeedback" style="margin-top: 15px; font-weight: bold;"></div>
    </div>
    
</body>
</html>
